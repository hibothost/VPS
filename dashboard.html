<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ICT/SMC Trading Bot</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:      #070710;
    --surface: #0d0d1a;
    --card:    #0f0f1e;
    --border:  #1a1a2e;
    --g:       #00d97e;
    --r:       #ff4560;
    --a:       #ffb547;
    --dim:     #3d4e6b;
    --muted:   #64748b;
    --text:    #c8d3e6;
    --font:    'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 12px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Header */
  #header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--g); box-shadow: 0 0 8px var(--g); animation: pulse 2s infinite; }
  .logo-text { color: var(--g); font-weight: 700; font-size: 13px; letter-spacing: 2px; }
  .price-ticker { display: flex; align-items: center; gap: 8px; }
  .price-val { font-size: 17px; font-weight: 700; transition: color 0.3s; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .badge { border-radius: 4px; padding: 3px 10px; font-size: 10px; font-weight: 700; letter-spacing: 1px; border: 1px solid; }
  .badge-live  { border-color: var(--g); background: rgba(0,217,126,.1); color: var(--g); }
  .badge-demo  { border-color: var(--r); background: rgba(255,69,96,.1);  color: var(--r); }
  .badge-warn  { border-color: var(--a); background: rgba(255,181,71,.1);  color: var(--a); }
  .badge-conn  { border-color: var(--a); background: rgba(255,181,71,.08); color: var(--a); animation: blink 1s infinite; }
  .badge-bull  { border-color: var(--g); background: rgba(0,217,126,.08); color: var(--g); }
  .badge-bear  { border-color: var(--r); background: rgba(255,69,96,.08);  color: var(--r); }
  .badge-neut  { border-color: var(--a); background: rgba(255,181,71,.08);  color: var(--a); }
  .btn { border-radius: 4px; padding: 5px 14px; font-size: 11px; font-weight: 700; font-family: var(--font); cursor: pointer; letter-spacing: 1px; border: 1px solid; transition: opacity .2s; }
  .btn:hover { opacity: .8; }
  .btn-start { border-color: var(--g); background: rgba(0,217,126,.15); color: var(--g); }
  .btn-stop  { border-color: var(--r); background: rgba(255,69,96,.15);  color: var(--r); }

  /* Stats bar */
  #stats-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stat-cell { padding: 8px 14px; border-right: 1px solid var(--border); }
  .stat-label { color: var(--dim); font-size: 9px; letter-spacing: 1px; margin-bottom: 3px; }
  .stat-val { font-size: 14px; font-weight: 700; }

  /* Main grid */
  #main { display: grid; grid-template-columns: 190px 1fr 270px; flex: 1; overflow: hidden; }

  /* Left panel */
  #left { background: var(--surface); border-right: 1px solid var(--border); padding: 12px; overflow-y: auto; }

  /* Center */
  #center { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
  #tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--dim); padding: 9px 18px; font-size: 10px; font-weight: 700; font-family: var(--font); cursor: pointer; letter-spacing: 1.5px; transition: all .2s; }
  .tab.active { border-bottom-color: var(--g); color: var(--g); background: var(--card); }
  #tab-content { flex: 1; overflow-y: auto; padding: 14px; }

  /* Right panel */
  #right { background: var(--surface); border-left: 1px solid var(--border); padding: 12px; overflow-y: auto; }

  /* Section headers */
  .sec-hdr { font-size: 9px; letter-spacing: 2px; color: var(--dim); border-bottom: 1px solid var(--border); padding-bottom: 4px; margin-bottom: 10px; }

  /* Kill zone cards */
  .kz-card { padding: 8px 10px; margin-bottom: 6px; border-radius: 4px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .kz-card.active { border-color: var(--g); background: rgba(0,217,126,.05); }
  .kz-name { font-size: 10px; font-weight: 700; }
  .kz-time { font-size: 9px; color: var(--dim); margin-top: 2px; }
  .kz-status { font-size: 9px; padding: 2px 7px; border-radius: 3px; }
  .kz-status.active { background: rgba(0,217,126,.15); color: var(--g); animation: blink 1.5s infinite; }
  .kz-status.inactive { color: var(--dim); }

  /* S&R bars */
  .sr-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0 4px 8px; margin-bottom: 2px; border-left: 2px solid; }
  .sr-row.res { border-left-color: var(--r); }
  .sr-row.sup { border-left-color: var(--g); }
  .sr-price { font-size: 10px; font-weight: 700; }
  .sr-row.res .sr-price { color: var(--r); }
  .sr-row.sup .sr-price { color: var(--g); }
  .sr-meta { font-size: 9px; color: var(--dim); }
  .sr-bars { display: flex; gap: 2px; align-items: flex-end; }
  .sr-bar { width: 4px; border-radius: 1px; }

  /* Signal cards */
  .sig-card { border-radius: 6px; padding: 12px; margin-bottom: 12px; border: 1px solid; border-left-width: 3px; }
  .sig-card.buy  { border-color: rgba(0,217,126,.2); border-left-color: var(--g); background: rgba(0,217,126,.02); }
  .sig-card.sell { border-color: rgba(255,69,96,.2);  border-left-color: var(--r); background: rgba(255,69,96,.02); }
  .sig-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .sig-dir { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 3px; }
  .sig-dir.buy  { background: rgba(0,217,126,.15); color: var(--g); }
  .sig-dir.sell { background: rgba(255,69,96,.15);  color: var(--r); }
  .sig-symbol { font-size: 13px; font-weight: 700; color: var(--text); margin-left: 8px; }
  .sig-kz { font-size: 9px; background: rgba(255,181,71,.1); color: var(--a); padding: 2px 7px; border-radius: 3px; margin-left: 6px; animation: blink 1.5s infinite; }
  .sig-score { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 3px; }
  .sig-levels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .sig-level { background: var(--card); border-radius: 4px; padding: 6px 8px; }
  .sig-level-lbl { font-size: 9px; color: var(--dim); margin-bottom: 2px; }
  .sig-level-val { font-size: 11px; font-weight: 700; }
  .sig-meta { display: flex; gap: 8px; margin-bottom: 8px; }
  .sig-tag { background: var(--card); padding: 3px 8px; border-radius: 3px; font-size: 10px; color: var(--dim); }
  .conf-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .conf-tag { background: var(--border); color: var(--muted); padding: 3px 8px; border-radius: 3px; font-size: 9px; }

  /* Open trade cards */
  .trade-card { border-radius: 5px; padding: 11px; margin-bottom: 10px; border: 1px solid; border-left-width: 3px; }
  .trade-card.buy  { border-color: rgba(0,217,126,.15); border-left-color: var(--g); background: rgba(0,217,126,.02); }
  .trade-card.sell { border-color: rgba(255,69,96,.15);  border-left-color: var(--r); background: rgba(255,69,96,.02); }
  .trade-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .trade-rows { }
  .trade-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .trade-row .lbl { color: var(--dim); font-size: 10px; }
  .trade-row .val { color: var(--muted); font-size: 10px; }
  .btn-close-trade { width: 100%; margin-top: 8px; background: rgba(255,69,96,.08); border: 1px solid rgba(255,69,96,.3); color: var(--r); border-radius: 3px; padding: 4px; font-size: 10px; font-family: var(--font); cursor: pointer; }
  .btn-close-trade:hover { background: rgba(255,69,96,.2); }

  /* History table */
  #history-table { width: 100%; border-collapse: collapse; }
  #history-table th { font-size: 9px; letter-spacing: 1px; color: var(--dim); padding: 5px 8px; border-bottom: 1px solid var(--border); text-align: left; }
  #history-table td { font-size: 10px; padding: 5px 8px; border-bottom: 1px solid #0a0a14; }

  /* Chart tab */
  #equity-canvas-wrap { height: 240px; margin-bottom: 14px; }
  .chart-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .chart-stat { background: var(--surface); border-radius: 4px; padding: 8px 12px; }
  .chart-stat-lbl { font-size: 9px; color: var(--dim); margin-bottom: 3px; }
  .chart-stat-val { font-size: 12px; font-weight: 700; }

  /* Empty state */
  .empty { text-align: center; color: var(--dim); padding: 50px 20px; }
  .empty-icon { font-size: 28px; margin-bottom: 10px; }
  .empty-text { font-size: 12px; }
  .empty-sub { font-size: 10px; color: var(--border); margin-top: 6px; }

  /* Config modal */
  #config-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
  #config-overlay.open { display: flex; }
  #config-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; width: 420px; }
  .config-title { font-size: 12px; font-weight: 700; color: var(--g); margin-bottom: 16px; letter-spacing: 1px; }
  .config-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .config-label { font-size: 10px; color: var(--muted); }
  .config-input { background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: var(--font); font-size: 11px; padding: 4px 8px; border-radius: 3px; width: 120px; }
  .config-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
  /* Symbol picker */
  .sym-search { width: 100%; margin-bottom: 5px; }
  .sym-select {
    width: 100%; height: 148px; background: var(--bg);
    border: 1px solid var(--border); color: var(--text);
    font-family: var(--font); font-size: 11px;
    border-radius: 3px; padding: 2px 0; overflow-y: auto;
    scrollbar-width: thin;
  }
  .sym-select option {
    padding: 4px 10px; cursor: pointer; background: var(--bg); color: var(--text);
  }
  .sym-select option:checked, .sym-select option:focus {
    background: rgba(0,217,126,.18); color: var(--g);
  }
  .sym-select optgroup { color: var(--dim); font-size: 10px; }
  .sym-badge {
    font-size: 9px; color: var(--g); margin-top: 4px;
    padding: 2px 8px; background: rgba(0,217,126,.08);
    border: 1px solid rgba(0,217,126,.2); border-radius: 3px;
    display: inline-block;
  }
  .sym-loading { color: var(--dim); font-size: 10px; font-style: italic; margin-top: 4px; }
  .btn-secondary { border-color: var(--border); background: var(--card); color: var(--muted); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:.5} }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="logo">
    <div class="pulse-dot" id="pulse-dot"></div>
    <span class="logo-text">ICT/SMC BOT</span>
    <span style="color:var(--dim);font-size:10px">v1.0</span>
    <span id="server-url-label" style="color:var(--dim);font-size:9px;margin-left:8px;cursor:pointer" onclick="changeServerUrl()" title="Click to change bot server URL"></span>
  </div>

  <div class="price-ticker">
    <span style="color:var(--dim);font-size:10px" id="price-symbol">EURUSD</span>
    <span class="price-val" id="price-val" style="color:var(--g)">—</span>
    <span id="price-arrow" style="font-size:11px;color:var(--g)">▲</span>
  </div>

  <div class="header-right">
    <span class="badge badge-demo" id="conn-badge">DEMO</span>
    <span class="badge" id="bias-badge">— NEUTRAL</span>
    <button class="btn btn-secondary" onclick="openConfig()">⚙ CONFIG</button>
    <button class="btn btn-secondary" id="reconnect-btn" onclick="reconnect()" style="display:none">↺ RECONNECT</button>
    <button class="btn btn-secondary" onclick="changeServerUrl()">🔗 SERVER</button>
    <button class="btn btn-start" id="toggle-btn" onclick="toggleBot()">▶ START</button>
  </div>
</div>

<!-- Stats bar -->
<div id="stats-bar">
  <div class="stat-cell"><div class="stat-label">BALANCE</div><div class="stat-val" id="s-balance">—</div></div>
  <div class="stat-cell"><div class="stat-label">EQUITY</div><div class="stat-val" id="s-equity">—</div></div>
  <div class="stat-cell"><div class="stat-label">FLOAT P&L</div><div class="stat-val" id="s-profit">—</div></div>
  <div class="stat-cell"><div class="stat-label">WIN RATE</div><div class="stat-val" id="s-winrate">—</div></div>
  <div class="stat-cell"><div class="stat-label">LAST SCAN</div><div class="stat-val" id="s-scan" style="font-size:11px;color:var(--dim)">—</div></div>
</div>

<!-- Main -->
<div id="main">

  <!-- Left Panel -->
  <div id="left">
    <div class="sec-hdr">KILL ZONES</div>
    <div id="kz-list"></div>

    <div class="sec-hdr" style="margin-top:14px">S&amp;R LEVELS</div>
    <div id="sr-list"></div>

    <div class="sec-hdr" style="margin-top:14px">ANALYSIS</div>
    <div id="analysis-stats"></div>
  </div>

  <!-- Center -->
  <div id="center">
    <div id="tabs">
      <button class="tab active" onclick="switchTab('signals', this)">SIGNALS</button>
      <button class="tab" onclick="switchTab('chart', this)">EQUITY</button>
      <button class="tab" onclick="switchTab('history', this)">HISTORY</button>
    </div>
    <div id="tab-content">
      <div id="tab-signals"></div>
      <div id="tab-chart" style="display:none"></div>
      <div id="tab-history" style="display:none"></div>
    </div>
  </div>

  <!-- Right Panel -->
  <div id="right">
    <div class="sec-hdr" id="trades-hdr">OPEN TRADES (0)</div>
    <div id="trades-list"></div>
  </div>

</div>

<!-- Config Modal -->
<div id="config-overlay">
  <div id="config-modal">
    <div class="config-title">⚙ BOT CONFIGURATION</div>
    <div style="margin-bottom:12px">
      <div style="font-size:10px;color:var(--muted);margin-bottom:6px">SYMBOL</div>
      <input id="cfg-symbol-search" class="config-input sym-search"
             placeholder="🔍  Filter instruments…" oninput="filterSymbols(this.value)" autocomplete="off"/>
      <select id="cfg-symbol" class="sym-select" size="7" onchange="onSymbolPick(this.value)">
        <option disabled>Loading broker instruments…</option>
      </select>
      <div id="cfg-symbol-badge" class="sym-loading">fetching symbols…</div>
    </div>
    <div class="config-row"><span class="config-label">Risk % per trade</span><input class="config-input" id="cfg-risk" type="number" step="0.1" /></div>
    <div class="config-row"><span class="config-label">Min R:R ratio</span><input class="config-input" id="cfg-rr" type="number" step="0.5" /></div>
    <div class="config-row"><span class="config-label">Max open trades</span><input class="config-input" id="cfg-max" type="number" /></div>
    <div class="config-row"><span class="config-label">Scan interval (sec)</span><input class="config-input" id="cfg-scan" type="number" /></div>
    <div class="config-row"><span class="config-label">Min confluence score</span><input class="config-input" id="cfg-conf" type="number" /></div>
    <div class="config-footer">
      <button class="btn btn-secondary" onclick="closeConfig()">CANCEL</button>
      <button class="btn btn-start" onclick="saveConfig()">SAVE CONFIG</button>
    </div>
  </div>
</div>

<script>
// ── Bot API base URL ────────────────────────────────────────────
// Stored in localStorage so it persists. First-run prompts the user.
// Examples: https://yourname-trading.trycloudflare.com  or  http://localhost:5000
let BASE = localStorage.getItem("botApiUrl") || "";
if (!BASE) {
  BASE = (window.location.protocol === "file:") ? "http://localhost:5000" : "";
}
let botRunning = false;
let isLive = false;
let equityChart = null;
let equityCurve = [];
let tradeHistory = [];
let lastPrice = 0;
let lastSymbol = "";
let currentTab = "signals";

// ── DEMO DATA ────────────────────────────────────────────────────
const DEMO = {
  running: false,
  connected: true,
  market_bias: "BULLISH",
  last_scan: new Date().toISOString(),
  error: null,
  account: { login: 12345678, balance: 10000, equity: 10234.56, profit: 234.56, currency: "USD", leverage: 100, broker: "Demo Broker" },
  active_signals: [
    {
      id: "BUY_001", symbol: "EURUSD", direction: "BUY",
      entry: 1.08542, sl: 1.08342, tp: 1.08942,
      risk_pips: 20.0, rr: 2.0, score: 4, in_kz: true,
      time: new Date().toISOString(),
      confluence: ["HTF Bullish Bias","Price in Bullish OB","Bullish FVG (3.2 pips)","Kill Zone: London Open"],
    },
    {
      id: "BUY_002", symbol: "GBPUSD", direction: "BUY",
      entry: 1.27124, sl: 1.26924, tp: 1.27524,
      risk_pips: 20.0, rr: 2.0, score: 3, in_kz: false,
      time: new Date(Date.now()-300000).toISOString(),
      confluence: ["HTF Bullish Bias","Price in Bullish OB","Support @ 1.27100"],
    },
  ],
  open_trades: [
    { ticket: 98765432, symbol: "EURUSD", direction: "BUY", entry: 1.08200, current: 1.08542, sl: 1.07900, tp: 1.08900, lots: 0.10, pnl: 342.00, time: new Date(Date.now()-7200000).toISOString() },
  ],
  kill_zones: [
    { name: "London Open", start: 7, end: 10, active: true, mins_left: 87 },
    { name: "New York Open", start: 12, end: 15, active: false, mins_until: 182 },
  ],
  sr_levels: [
    { price: 1.08900, type: "RESISTANCE", strength: 3, dist_pips: 35.8 },
    { price: 1.08700, type: "RESISTANCE", strength: 2, dist_pips: 15.8 },
    { price: 1.08200, type: "SUPPORT", strength: 4, dist_pips: 34.2 },
    { price: 1.07900, type: "SUPPORT", strength: 3, dist_pips: 64.2 },
  ],
  ob_count: 5, fvg_count: 3,
};

const DEMO_HISTORY = [
  { symbol:"EURUSD",direction:"BUY", entry:1.07800,close:1.08200,pips:40.0, pnl:400, time:"2025-05-28T09:15:00Z" },
  { symbol:"GBPUSD",direction:"SELL",entry:1.28100,close:1.27700,pips:40.0, pnl:400, time:"2025-05-28T14:22:00Z" },
  { symbol:"EURUSD",direction:"SELL",entry:1.08600,close:1.08900,pips:-30.0,pnl:-300,time:"2025-05-29T08:45:00Z" },
  { symbol:"XAUUSD",direction:"BUY", entry:2310.00,close:2324.00,pips:14.0, pnl:280, time:"2025-05-29T13:10:00Z" },
  { symbol:"EURUSD",direction:"BUY", entry:1.08100,close:1.08450,pips:35.0, pnl:350, time:"2025-05-30T09:00:00Z" },
  { symbol:"GBPJPY",direction:"SELL",entry:195.800,close:196.200,pips:-40.0,pnl:-400,time:"2025-05-30T14:30:00Z" },
  { symbol:"USDJPY",direction:"BUY", entry:152.400,close:152.800,pips:40.0, pnl:400, time:"2025-06-02T08:15:00Z" },
  { symbol:"EURUSD",direction:"BUY", entry:1.08300,close:1.08600,pips:30.0, pnl:300, time:"2025-06-03T09:30:00Z" },
];

// Build demo equity curve
const DEMO_EQUITY = Array.from({length:50},(_,i) => ({
  time: new Date(Date.now() - (50-i)*60000).toISOString(),
  equity: 10000 + Math.sin(i*0.4)*120 + i*4.5,
}));

// ── SYMBOL PICKER ─────────────────────────────────────────────────
let _allSymbols   = [];   // flat list from broker
let _groupedSyms  = {};   // grouped by asset class
let _pickedSymbol = "";

// Fallback list when bot is not connected / symbols haven't loaded yet
const FALLBACK_SYMBOLS = {
  "Forex":   ["EURUSD","GBPUSD","USDJPY","USDCHF","AUDUSD","NZDUSD","USDCAD",
               "GBPJPY","EURJPY","EURGBP","EURCAD","AUDCAD","GBPCAD","CADJPY"],
  "Metals":  ["XAUUSD","XAGUSD","XPTUSD"],
  "Indices": ["US30","US500","USTEC","UK100","GER40","FRA40","JPN225"],
  "Crypto":  ["BTCUSD","ETHUSD","LTCUSD","XRPUSD"],
  "Energy":  ["XTIUSD","XBRUSD","NGAS"],
};

async function loadSymbols(currentSymbol) {
  _pickedSymbol = currentSymbol || "EURUSD";
  const badge   = document.getElementById("cfg-symbol-badge");
  const sel     = document.getElementById("cfg-symbol");

  badge.className = "sym-loading";
  badge.textContent = "Fetching broker instruments…";

  try {
    const res  = await fetch(BASE + "/api/symbols", { signal: AbortSignal.timeout(10000) });
    const data = await res.json();

    if (data.symbols && data.symbols.length) {
      _allSymbols  = data.symbols;
      _groupedSyms = data.grouped || {};
      badge.className   = "sym-badge";
      badge.textContent = `✓ ${data.count} instruments from broker`;
    } else {
      throw new Error(data.error || "empty");
    }
  } catch (e) {
    _allSymbols  = Object.values(FALLBACK_SYMBOLS).flat();
    _groupedSyms = FALLBACK_SYMBOLS;
    badge.className   = "sym-loading";
    badge.textContent = "⚠ Bot offline — showing common instruments";
  }

  renderSymbolSelect(_groupedSyms, "");
}

function filterSymbols(q) {
  q = q.toUpperCase().trim();
  if (!q) {
    renderSymbolSelect(_groupedSyms, "");
    return;
  }
  // Flat filtered list — wrap in a single "Results" group
  const hits = _allSymbols.filter(s => s.toUpperCase().includes(q));
  renderSymbolSelect({ "Results": hits }, q);
}

function renderSymbolSelect(groups, highlight) {
  const sel = document.getElementById("cfg-symbol");
  let html  = "";
  for (const [grp, syms] of Object.entries(groups)) {
    if (!syms.length) continue;
    html += `<optgroup label="── ${grp} ──">`;
    for (const s of syms) {
      const sel_ = s === _pickedSymbol ? ' selected' : "";
      html += `<option value="${s}"${sel_}>${s}</option>`;
    }
    html += "</optgroup>";
  }
  if (!html) html = '<option disabled>No matches</option>';
  sel.innerHTML = html;
  // Scroll selected option into view
  const chosen = sel.querySelector("option[selected]");
  if (chosen) chosen.scrollIntoView({ block: "nearest" });
}

function onSymbolPick(val) {
  if (!val) return;
  _pickedSymbol = val;
  const badge = document.getElementById("cfg-symbol-badge");
  badge.className   = "sym-badge";
  badge.textContent = "✓ Selected: " + val;
}

// ── BOT SERVER URL ───────────────────────────────────────────────
function changeServerUrl() {
  const current = BASE || "(not set)";
  const input = prompt(
    "Enter your bot server URL\n\n" +
    "This is the Cloudflare Tunnel / public URL of the bot running on your VPS.\n" +
    "Example: https://yourname-trading.trycloudflare.com\n\n" +
    "Current: " + current,
    BASE
  );
  if (input === null) return;          // cancelled
  const cleaned = input.trim().replace(/\/$/, "");  // strip trailing slash
  BASE = cleaned;
  if (cleaned) {
    localStorage.setItem("botApiUrl", cleaned);
  } else {
    localStorage.removeItem("botApiUrl");
  }
  refresh();
}

// ── RECONNECT ─────────────────────────────────────────────────────
async function reconnect() {
  const rb = document.getElementById("reconnect-btn");
  if (rb) { rb.textContent = "↺ CONNECTING…"; rb.disabled = true; }
  try {
    await fetch(BASE + "/api/reconnect", { method: "POST", signal: AbortSignal.timeout(5000) });
  } catch {}
  setTimeout(() => { if (rb) { rb.textContent = "↺ RECONNECT"; rb.disabled = false; } }, 10000);
}

// ── FETCH ─────────────────────────────────────────────────────────
async function fetchStatus() {
  try {
    const res = await fetch(BASE+"/api/status", { signal: AbortSignal.timeout(2500) });
    if (!res.ok) throw new Error("bad response");
    const data = await res.json();
    isLive = true;
    return data;
  } catch {
    isLive = false;
    return DEMO;
  }
}

async function fetchHistory() {
  try {
    const res = await fetch(BASE+"/api/history", { signal: AbortSignal.timeout(2500) });
    if (res.ok) { const d = await res.json(); return d.trades || []; }
  } catch {}
  return DEMO_HISTORY;
}

async function fetchEquity() {
  try {
    const res = await fetch(BASE+"/api/equity", { signal: AbortSignal.timeout(2500) });
    if (res.ok) { const d = await res.json(); return d.curve || []; }
  } catch {}
  return DEMO_EQUITY;
}

// ── RENDER ────────────────────────────────────────────────────────
function render(data) {
  botRunning = data.running;
  const bias  = data.market_bias || "NEUTRAL";
  const acct  = data.account || {};
  const wins  = tradeHistory.filter(t => t.pnl > 0).length;
  const wr    = tradeHistory.length ? Math.round(wins/tradeHistory.length*100) : 0;

  // Pulse dot
  document.getElementById("pulse-dot").style.background = botRunning ? "var(--g)" : "var(--a)";

  // Show truncated server URL
  const urlLabel = document.getElementById("server-url-label");
  if (urlLabel) {
    if (BASE) {
      const short = BASE.replace(/^https?:\/\//, "").slice(0, 28);
      urlLabel.textContent = "🔗 " + short;
    } else {
      urlLabel.textContent = "🔗 not configured";
    }
  }

  // Connection badge — LIVE / CONNECTING / DISCONNECTED / DEMO
  const cb = document.getElementById("conn-badge");
  if (!isLive) {
    cb.className = "badge badge-demo";  cb.textContent = "DEMO";
  } else if (data.connected) {
    cb.className = "badge badge-live";  cb.textContent = "LIVE";
  } else if (data.error && data.error.includes("Reconnect")) {
    cb.className = "badge badge-conn";  cb.textContent = "CONNECTING";
  } else {
    cb.className = "badge badge-warn";  cb.textContent = "DISCONNECTED";
  }

  // Bias badge
  const bb = document.getElementById("bias-badge");
  bb.className = "badge " + (bias==="BULLISH" ? "badge-bull" : bias==="BEARISH" ? "badge-bear" : "badge-neut");
  bb.textContent = "H4 " + bias;

  // Toggle btn
  const tb = document.getElementById("toggle-btn");
  tb.className = "btn " + (botRunning ? "btn-stop" : "btn-start");
  tb.textContent = botRunning ? "■ STOP" : "▶ START";
  tb.disabled = isLive && !data.connected;
  tb.style.opacity = tb.disabled ? "0.4" : "1";
  // Reconnect button — visible when live but disconnected
  const rb = document.getElementById("reconnect-btn");
  if (rb) rb.style.display = (isLive && !data.connected) ? "" : "none";

  // Stats
  const fmt = n => n != null ? "$"+Number(n).toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2}) : "—";
  document.getElementById("s-balance").textContent = fmt(acct.balance);
  document.getElementById("s-equity").textContent  = fmt(acct.equity);
  const profit = acct.profit ?? 0;
  const pe = document.getElementById("s-profit");
  pe.textContent = (profit>=0?"+":"")+fmt(Math.abs(profit)).replace("$","$");
  pe.style.color = profit>=0 ? "var(--g)" : "var(--r)";
  const wre = document.getElementById("s-winrate");
  wre.textContent = tradeHistory.length ? wr+"%" : "—";
  wre.style.color = wr>=50 ? "var(--g)" : "var(--r)";
  document.getElementById("s-scan").textContent = data.last_scan ? new Date(data.last_scan).toLocaleTimeString() : "—";

  // Error / status banner
  let banner = document.getElementById("error-banner");
  if (!banner) {
    banner = document.createElement("div");
    banner.id = "error-banner";
    banner.style.cssText = "background:rgba(255,181,71,.08);border-bottom:1px solid rgba(255,181,71,.3);padding:6px 20px;font-size:10px;color:var(--a);display:none;";
    document.getElementById("stats-bar").after(banner);
  }
  if (isLive && data.error) {
    banner.style.display = "";
    banner.textContent = "⚠ " + data.error;
  } else {
    banner.style.display = "none";
  }

  // ── Price ticker — always tracks CONFIG symbol, not just open trades ──
  const sym = data.symbol || lastSymbol || "EURUSD";
  document.getElementById("price-symbol").textContent = sym;

  // Reset baseline when symbol changes so arrows don't flicker
  if (sym !== lastSymbol) { lastPrice = 0; lastSymbol = sym; }

  // Price priority: cached bot-loop price → matching open trade → matching signal
  let curPrice = null, pDigits = 5;
  const cp = data.current_price || {};
  if (cp.symbol === sym && cp.mid) {
    curPrice = cp.mid;
    pDigits  = cp.digits || 5;
  } else {
    const trade = (data.open_trades || []).find(t => t.symbol === sym);
    if (trade) { curPrice = trade.current; }
    else {
      const sig = (data.active_signals || []).find(s => s.symbol === sym);
      if (sig) curPrice = sig.entry;
    }
  }
  if (curPrice) {
    const pv = document.getElementById("price-val");
    pv.textContent = curPrice.toFixed(pDigits);
    pv.style.color = curPrice > lastPrice ? "var(--g)" : curPrice < lastPrice ? "var(--r)" : "var(--text)";
    document.getElementById("price-arrow").textContent  = curPrice >= lastPrice ? "▲" : "▼";
    document.getElementById("price-arrow").style.color  = curPrice >= lastPrice ? "var(--g)" : "var(--r)";
    lastPrice = curPrice;
  }

  renderKillZones(data.kill_zones || []);
  renderSR(data.sr_levels || []);
  renderAnalysis(data);
  renderSignals(data.active_signals || [], bias);
  renderTrades(data.open_trades || []);
}

function renderKillZones(kzs) {
  document.getElementById("kz-list").innerHTML = kzs.map(kz => `
    <div class="kz-card ${kz.active ? "active" : ""}">
      <div>
        <div class="kz-name" style="color:${kz.active ? "var(--g)" : "var(--dim)"}">${kz.name}</div>
        <div class="kz-time">${kz.start}:00 – ${kz.end}:00 UTC</div>
      </div>
      <div class="kz-status ${kz.active ? "active" : "inactive"}">
        ${kz.active ? kz.mins_left+"m left" : "in "+kz.mins_until+"m"}
      </div>
    </div>
  `).join("");
}

function renderSR(levels) {
  document.getElementById("sr-list").innerHTML = levels.map(l => {
    const bars = Array.from({length:Math.min(l.strength,5)},(_,i)=>`
      <div class="sr-bar" style="height:${6+i*2}px;background:${l.type==="RESISTANCE"?"var(--r)":"var(--g)"};opacity:${0.3+0.7*i/4}"></div>`).join("");
    return `<div class="sr-row ${l.type==="RESISTANCE"?"res":"sup"}">
      <div>
        <div class="sr-price">${l.price.toFixed(5)}</div>
        <div class="sr-meta">${l.type.slice(0,4)} · ${l.dist_pips}p</div>
      </div>
      <div class="sr-bars">${bars}</div>
    </div>`;
  }).join("");
}

function renderAnalysis(data) {
  const rows = [
    ["OBs Found",   data.ob_count ?? 0,   "var(--text)"],
    ["FVGs Found",  data.fvg_count ?? 0,   "var(--text)"],
    ["Open Trades", (data.open_trades||[]).length, "var(--text)"],
    ["Signals",     (data.active_signals||[]).length, (data.active_signals||[]).length > 0 ? "var(--a)" : "var(--text)"],
    ["History",     tradeHistory.length, "var(--text)"],
    ["Win/Loss",    `${tradeHistory.filter(t=>t.pnl>0).length}/${tradeHistory.filter(t=>t.pnl<=0).length}`, "var(--g)"],
  ];
  document.getElementById("analysis-stats").innerHTML = rows.map(([l,v,c])=>`
    <div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--card)">
      <span style="color:var(--dim);font-size:10px">${l}</span>
      <span style="color:${c};font-size:10px;font-weight:700">${v}</span>
    </div>`).join("");
}

function renderSignals(sigs, bias) {
  if (currentTab !== "signals") return;
  const el = document.getElementById("tab-signals");
  if (!sigs.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">◎</div><div class="empty-text">Scanning for setups…</div><div class="empty-sub">Waiting for ICT/SMC confluence · Bias: ${bias}</div></div>`;
    return;
  }
  el.innerHTML = sigs.map(sig => {
    const isLong = sig.direction === "BUY";
    const sc = sig.score >= 4 ? "var(--g)" : sig.score >= 3 ? "var(--a)" : "var(--muted)";
    return `
    <div class="sig-card ${isLong?"buy":"sell"}">
      <div class="sig-header">
        <div style="display:flex;align-items:center">
          <span class="sig-dir ${isLong?"buy":"sell"}">${isLong?"▲ BUY":"▼ SELL"}</span>
          <span class="sig-symbol">${sig.symbol}</span>
          ${sig.in_kz ? '<span class="sig-kz">⚡ KILL ZONE</span>' : ""}
        </div>
        <span class="sig-score" style="background:${sc}18;color:${sc}">SCORE ${sig.score}/5</span>
      </div>
      <div class="sig-levels">
        <div class="sig-level"><div class="sig-level-lbl">ENTRY</div><div class="sig-level-val" style="color:var(--text)">${sig.entry.toFixed(5)}</div></div>
        <div class="sig-level"><div class="sig-level-lbl">STOP LOSS</div><div class="sig-level-val" style="color:var(--r)">${sig.sl.toFixed(5)}</div></div>
        <div class="sig-level"><div class="sig-level-lbl">TAKE PROFIT</div><div class="sig-level-val" style="color:var(--g)">${sig.tp.toFixed(5)}</div></div>
      </div>
      <div class="sig-meta">
        <span class="sig-tag">Risk: ${sig.risk_pips} pips</span>
        <span class="sig-tag" style="color:var(--g)">R:R = 1:${sig.rr}</span>
        <span class="sig-tag">${new Date(sig.time).toLocaleTimeString()}</span>
      </div>
      <div class="conf-list">${(sig.confluence||[]).map(c=>`<span class="conf-tag">✓ ${c}</span>`).join("")}</div>
    </div>`;
  }).join("");
}

function renderTrades(trades) {
  document.getElementById("trades-hdr").textContent = `OPEN TRADES (${trades.length})`;
  const el = document.getElementById("trades-list");
  if (!trades.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon" style="font-size:20px">—</div><div class="empty-text" style="font-size:11px">No open trades</div></div>`;
    return;
  }
  el.innerHTML = trades.map(t => {
    const isLong = t.direction === "BUY";
    const pc = t.pnl >= 0 ? "var(--g)" : "var(--r)";
    return `
    <div class="trade-card ${isLong?"buy":"sell"}">
      <div class="trade-header">
        <div>
          <span style="color:${isLong?"var(--g)":"var(--r)"};font-weight:700;font-size:11px">${isLong?"▲":"▼"} ${t.direction}</span>
          <span style="font-size:12px;font-weight:700;margin-left:6px">${t.symbol}</span>
        </div>
        <span style="color:${pc};font-weight:700;font-size:12px">${t.pnl>=0?"+":""}$${Math.abs(t.pnl).toFixed(2)}</span>
      </div>
      <div class="trade-rows">
        ${[["Entry",t.entry.toFixed(5)],["Current",t.current.toFixed(5)],["SL",t.sl.toFixed(5)],["TP",t.tp.toFixed(5)],["Size",t.lots+" lots"],["#Ticket",t.ticket]].map(([l,v])=>`
        <div class="trade-row"><span class="lbl">${l}</span><span class="val">${v}</span></div>`).join("")}
      </div>
      <button class="btn-close-trade" onclick="closeTrade(${t.ticket})">✕ CLOSE TRADE</button>
    </div>`;
  }).join("");
}

function renderHistory() {
  if (currentTab !== "history") return;
  const el = document.getElementById("tab-history");
  if (!tradeHistory.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No trade history yet</div></div>`;
    return;
  }
  const rows = tradeHistory.slice().reverse().map(t => {
    const win = t.pnl > 0;
    const pipsDisplay = t.pips != null ? t.pips : "—";
    return `<tr>
      <td>${t.symbol}</td>
      <td style="color:${t.direction==="BUY"?"var(--g)":"var(--r)"}">${t.direction==="BUY"?"▲ BUY":"▼ SELL"}</td>
      <td style="color:var(--muted)">${typeof t.entry==="number"?t.entry.toFixed(5):t.entry}</td>
      <td style="color:var(--muted)">${typeof t.close==="number"?t.close.toFixed(5):"—"}</td>
      <td style="color:${win?"var(--g)":"var(--r)"}">${typeof pipsDisplay==="number"?(pipsDisplay>0?"+":"")+pipsDisplay.toFixed(1):"—"}</td>
      <td style="color:${win?"var(--g)":"var(--r)"};font-weight:700">${win?"+":""}$${t.pnl.toFixed(2)}</td>
      <td style="color:var(--dim)">${new Date(t.time).toLocaleDateString()}</td>
    </tr>`;
  }).join("");
  el.innerHTML = `<table id="history-table">
    <thead><tr><th>SYMBOL</th><th>DIR</th><th>ENTRY</th><th>CLOSE</th><th>PIPS</th><th>P&L</th><th>DATE</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderEquityChart() {
  if (currentTab !== "chart") return;
  const tab = document.getElementById("tab-chart");
  tab.innerHTML = `
    <div style="color:var(--dim);font-size:9px;letter-spacing:2px;margin-bottom:10px">EQUITY CURVE</div>
    <div id="equity-canvas-wrap"><canvas id="equity-canvas"></canvas></div>
    <div class="chart-stats" id="chart-stats"></div>`;

  const ctx = document.getElementById("equity-canvas").getContext("2d");
  if (equityChart) equityChart.destroy();

  const labels  = equityCurve.map(p => new Date(p.time).toLocaleTimeString());
  const values  = equityCurve.map(p => p.equity);
  const start   = values[0] || 10000;
  const current = values[values.length-1] || start;
  const peak    = Math.max(...values);
  const dd      = ((peak - current) / peak * 100).toFixed(1);

  equityChart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: "#00d97e",
        borderWidth: 1.5,
        pointRadius: 0,
        fill: true,
        backgroundColor: ctx => {
          const g = ctx.chart.ctx.createLinearGradient(0,0,0,200);
          g.addColorStop(0,"rgba(0,217,126,0.15)");
          g.addColorStop(1,"rgba(0,217,126,0)");
          return g;
        },
        tension: 0.3,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => "$"+ctx.raw.toFixed(2) },
        backgroundColor: "#0d0d1a",
        borderColor: "#1a1a2e",
        borderWidth: 1,
        titleColor: "#64748b",
        bodyColor: "#c8d3e6",
      }},
      scales: {
        x: { display: false },
        y: {
          grid: { color: "#1a1a2e" },
          ticks: { color: "#3d4e6b", font: { family: "monospace", size: 10 }, callback: v => "$"+v.toFixed(0) },
        },
      },
    },
  });

  document.getElementById("chart-stats").innerHTML = [
    ["Start Balance", "$"+start.toFixed(2), "var(--muted)"],
    ["Current Equity","$"+current.toFixed(2),"var(--text)"],
    ["Peak Equity",   "$"+peak.toFixed(2),   "var(--g)"],
    ["Drawdown",      dd+"%",                parseFloat(dd)<5?"var(--a)":"var(--r)"],
    ["Total Trades",  tradeHistory.length,   "var(--text)"],
    ["Total P&L",     "$"+tradeHistory.reduce((s,t)=>s+t.pnl,0).toFixed(2), tradeHistory.reduce((s,t)=>s+t.pnl,0)>=0?"var(--g)":"var(--r)"],
  ].map(([l,v,c])=>`<div class="chart-stat"><div class="chart-stat-lbl">${l}</div><div class="chart-stat-val" style="color:${c}">${v}</div></div>`).join("");
}

// ── TABS ──────────────────────────────────────────────────────────
function switchTab(name, el) {
  currentTab = name;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  ["signals","chart","history"].forEach(t => {
    document.getElementById("tab-"+t).style.display = t === name ? "" : "none";
  });
  if (name === "chart")   renderEquityChart();
  if (name === "history") renderHistory();
}

// ── BOT CONTROL ───────────────────────────────────────────────────
async function toggleBot() {
  const ep = botRunning ? "/api/stop" : "/api/start";
  try {
    await fetch(BASE+ep, { method:"POST", signal: AbortSignal.timeout(3000) });
    await refresh();
  } catch {
    alert("Could not reach bot server at localhost:5000.\nMake sure mt5_trading_bot.py is running.");
  }
}

async function closeTrade(ticket) {
  if (!confirm(`Close trade #${ticket}?`)) return;
  try {
    const res = await fetch(`${BASE}/api/close/${ticket}`, { method:"POST", signal: AbortSignal.timeout(3000) });
    const data = await res.json();
    alert(data.message || data.error);
    await refresh();
  } catch {
    alert("Cannot reach bot server.");
  }
}

// ── CONFIG ────────────────────────────────────────────────────────
async function openConfig() {
  let currentSymbol = "EURUSD";
  try {
    const res = await fetch(BASE+"/api/config", { signal: AbortSignal.timeout(2000) });
    if (res.ok) {
      const cfg = await res.json();
      currentSymbol = cfg.symbol || "EURUSD";
      document.getElementById("cfg-risk").value = cfg.risk_pct    || 1.0;
      document.getElementById("cfg-rr").value   = cfg.min_rr      || 2.0;
      document.getElementById("cfg-max").value  = cfg.max_trades  || 3;
      document.getElementById("cfg-scan").value = cfg.scan_interval || 60;
      document.getElementById("cfg-conf").value = cfg.min_confluence || 3;
    }
  } catch {}
  document.getElementById("config-overlay").classList.add("open");
  // Clear search & load symbol list after modal is visible
  document.getElementById("cfg-symbol-search").value = "";
  loadSymbols(currentSymbol);
}
function closeConfig() {
  document.getElementById("config-overlay").classList.remove("open");
}
async function saveConfig() {
  const body = {
    symbol:          _pickedSymbol || document.getElementById("cfg-symbol").value,
    risk_pct:   parseFloat(document.getElementById("cfg-risk").value),
    min_rr:     parseFloat(document.getElementById("cfg-rr").value),
    max_trades: parseInt(document.getElementById("cfg-max").value),
    scan_interval: parseInt(document.getElementById("cfg-scan").value),
    min_confluence: parseInt(document.getElementById("cfg-conf").value),
  };
  try {
    await fetch(BASE+"/api/config", { method:"POST", body: JSON.stringify(body), headers:{"Content-Type":"application/json"}, signal: AbortSignal.timeout(3000) });
    closeConfig();
    refresh();  // update ticker immediately after symbol change
  } catch {
    alert("Cannot reach bot — config saved locally only.");
    closeConfig();
  }
}

// ── MAIN REFRESH LOOP ─────────────────────────────────────────────
async function refresh() {
  const [status, hist, equity] = await Promise.all([fetchStatus(), fetchHistory(), fetchEquity()]);
  tradeHistory = hist;
  equityCurve  = equity;
  render(status);
  if (currentTab === "history") renderHistory();
  if (currentTab === "chart")   renderEquityChart();
}

if (!BASE && window.location.protocol !== "file:") {
  // First run on Render — ask once where the bot server lives
  changeServerUrl();
} else {
  refresh();
}
setInterval(refresh, 5000);

// Close modal on outside click
document.getElementById("config-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("config-overlay")) closeConfig();
});
</script>
