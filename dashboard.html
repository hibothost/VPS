<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ICT/SMC Trading Bot</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:      #06060f;
    --surface: #0b0b18;
    --card:    #0e0e1c;
    --border:  #171728;
    --g:       #00d97e;
    --r:       #ff4560;
    --a:       #ffb547;
    --b:       #4ea8ff;
    --p:       #a78bfa;
    --dim:     #374151;
    --muted:   #6b7280;
    --text:    #c8d3e6;
    --font:    'JetBrains Mono','Fira Code','Courier New',monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 12px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* HEADER */
  #header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 16px; height: 44px;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 9px; }
  .pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--g); box-shadow: 0 0 8px var(--g); animation: pulse 2s infinite; }
  .logo-text { color: var(--g); font-weight: 700; font-size: 13px; letter-spacing: 2px; }
  .header-center { display: flex; align-items: center; gap: 12px; }
  .price-block { display: flex; align-items: center; gap: 7px; }
  .price-sym { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 1px; }
  .price-val { font-size: 18px; font-weight: 700; transition: color 0.3s; font-variant-numeric: tabular-nums; }
  .header-right { display: flex; align-items: center; gap: 7px; }
  .badge { border-radius: 4px; padding: 3px 9px; font-size: 9px; font-weight: 700; letter-spacing: 1px; border: 1px solid; }
  .badge-live  { border-color: var(--g); background: rgba(0,217,126,.1); color: var(--g); }
  .badge-demo  { border-color: var(--r); background: rgba(255,69,96,.1);  color: var(--r); }
  .badge-warn  { border-color: var(--a); background: rgba(255,181,71,.1);  color: var(--a); }
  .badge-conn  { border-color: var(--a); background: rgba(255,181,71,.08); color: var(--a); animation: blink 1s infinite; }
  .badge-bull  { border-color: var(--g); background: rgba(0,217,126,.08); color: var(--g); }
  .badge-bear  { border-color: var(--r); background: rgba(255,69,96,.08);  color: var(--r); }
  .badge-neut  { border-color: var(--a); background: rgba(255,181,71,.08); color: var(--a); }
  .btn { border-radius: 4px; padding: 5px 13px; font-size: 10px; font-weight: 700; font-family: var(--font); cursor: pointer; letter-spacing: 1px; border: 1px solid; transition: opacity .2s; }
  .btn:hover { opacity: .72; }
  .btn-start { border-color: var(--g); background: rgba(0,217,126,.12); color: var(--g); }
  .btn-stop  { border-color: var(--r); background: rgba(255,69,96,.12);  color: var(--r); }
  .btn-dim   { border-color: var(--border); background: var(--card); color: var(--muted); }

  /* STATS BAR */
  #stats-bar {
    display: grid; grid-template-columns: repeat(5,1fr);
    background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .stat-cell { padding: 7px 14px; border-right: 1px solid var(--border); }
  .stat-label { color: var(--dim); font-size: 8px; letter-spacing: 1.5px; margin-bottom: 3px; }
  .stat-val { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }

  /* MAIN GRID */
  #main { display: grid; grid-template-columns: 220px 1fr 268px; flex: 1; overflow: hidden; }

  /* LEFT PANEL */
  #left { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .ps { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .sec-hdr { font-size: 8px; letter-spacing: 2px; color: var(--dim); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .save-ind { font-size: 8px; color: var(--g); opacity: 0; transition: opacity .3s; }
  .save-ind.show { opacity: 1; }

  /* ACCOUNT SWITCHER */
  .acct-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 5px;
    padding: 10px; margin-bottom: 8px;
  }
  .acct-card.connected { border-color: rgba(0,217,126,.2); }
  .acct-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 7px; }
  .acct-broker { font-size: 11px; font-weight: 700; color: var(--text); }
  .acct-status-dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 3px; flex-shrink: 0; }
  .acct-status-dot.on  { background: var(--g); box-shadow: 0 0 5px var(--g); }
  .acct-status-dot.off { background: var(--dim); }
  .acct-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .acct-row .lbl { color: var(--dim); font-size: 9px; }
  .acct-row .val { color: var(--muted); font-size: 9px; font-variant-numeric: tabular-nums; }
  .acct-actions { display: flex; gap: 5px; margin-top: 8px; }
  .btn-acct {
    flex: 1; border-radius: 3px; padding: 5px; font-size: 9px; font-weight: 700;
    font-family: var(--font); cursor: pointer; border: 1px solid; letter-spacing: .5px; text-align: center;
  }
  .btn-acct:hover { opacity: .75; }
  .btn-acct-switch { border-color: rgba(78,168,255,.3); background: rgba(78,168,255,.07); color: var(--b); }
  .btn-acct-logout { border-color: rgba(255,69,96,.25); background: rgba(255,69,96,.06); color: var(--r); }

  /* Login form (inline, collapsible) */
  .login-form { display: none; }
  .login-form.open { display: block; }
  .lf-title { font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-bottom: 8px; }
  .lf-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: var(--font); font-size: 10px; padding: 5px 7px; border-radius: 3px; margin-bottom: 5px;
  }
  .lf-input:focus { outline: none; border-color: var(--g); }
  .lf-input::placeholder { color: var(--dim); }
  .lf-row { display: flex; gap: 5px; }
  .btn-lf-connect {
    flex: 1; background: rgba(0,217,126,.1); border: 1px solid rgba(0,217,126,.3);
    color: var(--g); font-family: var(--font); font-size: 10px; font-weight: 700;
    padding: 6px; border-radius: 3px; cursor: pointer; letter-spacing: 1px;
  }
  .btn-lf-connect:hover { background: rgba(0,217,126,.2); }
  .btn-lf-connect:disabled { opacity: .4; cursor: not-allowed; }
  .btn-lf-cancel {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    font-family: var(--font); font-size: 10px; padding: 6px 10px; border-radius: 3px; cursor: pointer;
  }

  /* SAVED ACCOUNTS */
  .saved-accts { margin-top: 7px; }
  .saved-acct-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 8px; border-radius: 3px; border: 1px solid var(--border);
    background: var(--bg); cursor: pointer; margin-bottom: 4px; transition: border-color .15s;
  }
  .saved-acct-item:hover { border-color: var(--b); }
  .saved-acct-name { font-size: 9px; color: var(--text); font-weight: 700; }
  .saved-acct-sub  { font-size: 8px; color: var(--dim); margin-top: 1px; }
  .saved-acct-del  { font-size: 9px; color: var(--dim); cursor: pointer; padding: 2px 5px; }
  .saved-acct-del:hover { color: var(--r); }

  /* SYMBOL PICKER */
  .sym-search {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    font-family: var(--font); font-size: 10px; padding: 5px 7px; border-radius: 3px; margin-bottom: 6px;
  }
  .sym-search:focus { outline: none; border-color: var(--g); }
  .sym-search::placeholder { color: var(--dim); }
  .sym-search:disabled { opacity: .4; cursor: not-allowed; }
  .sym-group-lbl { font-size: 7px; color: var(--dim); letter-spacing: 1.5px; padding: 4px 0 3px; }
  .sym-grid { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 3px; }
  .sym-btn {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    font-family: var(--font); font-size: 9px; font-weight: 700;
    padding: 3px 6px; border-radius: 3px; cursor: pointer; letter-spacing: .2px; transition: all .12s;
  }
  .sym-btn:hover { border-color: var(--b); color: var(--b); background: rgba(78,168,255,.06); }
  .sym-btn.active { border-color: var(--g); color: var(--g); background: rgba(0,217,126,.1); }
  .sym-status { font-size: 9px; color: var(--dim); padding: 8px 4px; text-align: center; }
  .sym-status.error { color: var(--r); }
  .sym-refresh {
    font-size: 8px; color: var(--b); cursor: pointer; padding: 2px 5px; border-radius: 3px;
    border: 1px solid var(--border); background: var(--card); letter-spacing: .5px;
  }
  .sym-refresh:hover { border-color: var(--b); }

  /* STRATEGIES */
  .strat-list { display: flex; flex-direction: column; gap: 1px; }
  .strat-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
  .strat-check { width: 13px; height: 13px; accent-color: var(--g); cursor: pointer; flex-shrink: 0; }
  .strat-name { font-size: 9px; color: var(--dim); flex: 1; transition: color .15s; }
  .strat-row.on .strat-name { color: var(--text); }
  .strat-cat { font-size: 7px; padding: 1px 5px; border-radius: 2px; letter-spacing: .4px; flex-shrink: 0; }
  .c-ict  { background: rgba(0,217,126,.1);   color: var(--g); }
  .c-smc  { background: rgba(167,139,250,.1); color: var(--p); }
  .c-tech { background: rgba(78,168,255,.1);  color: var(--b); }
  .c-pa   { background: rgba(255,181,71,.1);  color: var(--a); }

  /* KILL ZONES */
  .kz-card { padding: 7px 9px; margin-bottom: 4px; border-radius: 4px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .kz-card.active { border-color: rgba(0,217,126,.3); background: rgba(0,217,126,.04); }
  .kz-name { font-size: 10px; font-weight: 700; color: var(--muted); }
  .kz-card.active .kz-name { color: var(--g); }
  .kz-time { font-size: 8px; color: var(--dim); margin-top: 1px; }
  .kz-badge { font-size: 8px; padding: 2px 6px; border-radius: 3px; }
  .kz-badge.active   { background: rgba(0,217,126,.12); color: var(--g); animation: blink 1.5s infinite; }
  .kz-badge.inactive { color: var(--dim); }

  /* SETTINGS */
  .set-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid rgba(23,23,40,.8); }
  .set-row:last-child { border-bottom: none; }
  .set-label { font-size: 9px; color: var(--muted); }
  .set-input { background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: var(--font); font-size: 10px; padding: 3px 6px; border-radius: 3px; width: 60px; text-align: right; }
  .set-input:focus { outline: none; border-color: var(--g); }

  /* CENTER */
  #center { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
  #tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--dim); padding: 9px 18px; font-size: 9px; font-weight: 700; font-family: var(--font); cursor: pointer; letter-spacing: 1.5px; transition: all .2s; }
  .tab.active { border-bottom-color: var(--g); color: var(--g); background: var(--card); }
  #tab-content { flex: 1; overflow-y: auto; padding: 14px; }

  /* SIGNAL CARDS */
  .sig-card { border-radius: 6px; padding: 13px; margin-bottom: 12px; border: 1px solid; border-left-width: 3px; }
  .sig-card.buy  { border-color: rgba(0,217,126,.15); border-left-color: var(--g); background: rgba(0,217,126,.02); }
  .sig-card.sell { border-color: rgba(255,69,96,.15);  border-left-color: var(--r); background: rgba(255,69,96,.02); }
  .sig-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .sig-left { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .sig-dir { font-size: 10px; font-weight: 700; padding: 2px 9px; border-radius: 3px; }
  .sig-dir.buy  { background: rgba(0,217,126,.15); color: var(--g); }
  .sig-dir.sell { background: rgba(255,69,96,.15);  color: var(--r); }
  .sig-symbol { font-size: 14px; font-weight: 700; }
  .sig-kz { font-size: 8px; background: rgba(255,181,71,.1); color: var(--a); padding: 2px 6px; border-radius: 3px; animation: blink 1.5s infinite; }
  .sig-strat { font-size: 8px; padding: 2px 6px; border-radius: 3px; background: rgba(167,139,250,.1); color: var(--p); }
  .sig-score-block { text-align: right; }
  .sig-score-num { font-size: 12px; font-weight: 700; }
  .score-pips { display: flex; gap: 2px; justify-content: flex-end; margin-top: 3px; }
  .score-pip { width: 14px; height: 4px; border-radius: 1px; background: var(--border); }
  .score-pip.on { background: var(--g); }
  .sig-levels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .sig-level { background: var(--card); border-radius: 4px; padding: 7px 9px; border: 1px solid var(--border); }
  .sig-level-lbl { font-size: 8px; color: var(--dim); letter-spacing: 1px; margin-bottom: 3px; }
  .sig-level-val { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .sig-meta { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
  .sig-tag { background: var(--card); padding: 3px 8px; border-radius: 3px; font-size: 9px; color: var(--dim); border: 1px solid var(--border); }

  /* CONFLUENCE */
  .conf-hdr { font-size: 8px; letter-spacing: 1.5px; color: var(--dim); margin-bottom: 5px; }
  .conf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
  .conf-item { display: flex; align-items: center; gap: 5px; padding: 3px 6px; border-radius: 3px; font-size: 9px; }
  .conf-item.hit  { background: rgba(0,217,126,.06); color: var(--text); border: 1px solid rgba(0,217,126,.12); }
  .conf-item.miss { background: rgba(23,23,40,.5); color: var(--dim); border: 1px solid var(--border); }
  .conf-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .conf-dot.hit  { background: var(--g); box-shadow: 0 0 4px var(--g); }
  .conf-dot.miss { background: var(--dim); }

  /* RIGHT PANEL */
  #right { background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
  .right-sec { padding: 10px 12px; border-bottom: 1px solid var(--border); }

  /* TRADE CARDS */
  .trade-card { border-radius: 5px; padding: 10px; margin-bottom: 8px; border: 1px solid; border-left-width: 3px; }
  .trade-card.buy  { border-color: rgba(0,217,126,.12); border-left-color: var(--g); background: rgba(0,217,126,.02); }
  .trade-card.sell { border-color: rgba(255,69,96,.12);  border-left-color: var(--r); background: rgba(255,69,96,.02); }
  .trade-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .trade-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .trade-row .lbl { color: var(--dim); font-size: 9px; }
  .trade-row .val { color: var(--muted); font-size: 9px; font-variant-numeric: tabular-nums; }
  .btn-close-trade { width: 100%; margin-top: 7px; background: rgba(255,69,96,.06); border: 1px solid rgba(255,69,96,.2); color: var(--r); border-radius: 3px; padding: 4px; font-size: 9px; font-family: var(--font); cursor: pointer; }
  .btn-close-trade:hover { background: rgba(255,69,96,.14); }

  /* S&R */
  .sr-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0 4px 7px; margin-bottom: 2px; border-left: 2px solid; }
  .sr-row.res { border-left-color: var(--r); }
  .sr-row.sup { border-left-color: var(--g); }
  .sr-price { font-size: 10px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .sr-row.res .sr-price { color: var(--r); }
  .sr-row.sup .sr-price { color: var(--g); }
  .sr-meta { font-size: 8px; color: var(--dim); }
  .sr-bars { display: flex; gap: 2px; align-items: flex-end; }
  .sr-bar { width: 4px; border-radius: 1px; }

  /* HISTORY */
  #history-table { width: 100%; border-collapse: collapse; }
  #history-table th { font-size: 8px; letter-spacing: 1px; color: var(--dim); padding: 5px 7px; border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap; }
  #history-table td { font-size: 9px; padding: 5px 7px; border-bottom: 1px solid #09090f; font-variant-numeric: tabular-nums; }

  /* EQUITY CHART */
  #equity-canvas-wrap { height: 220px; margin-bottom: 14px; }
  .chart-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .chart-stat { background: var(--surface); border-radius: 4px; padding: 8px 10px; border: 1px solid var(--border); }
  .chart-stat-lbl { font-size: 8px; color: var(--dim); letter-spacing: 1px; margin-bottom: 3px; }
  .chart-stat-val { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }

  /* EMPTY */
  .empty { text-align: center; color: var(--dim); padding: 30px 16px; }
  .empty-icon { font-size: 22px; margin-bottom: 7px; }
  .empty-text { font-size: 11px; }
  .empty-sub { font-size: 9px; color: var(--border); margin-top: 4px; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  @keyframes blink  { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="logo">
    <div class="pulse-dot" id="pulse-dot"></div>
    <span class="logo-text">ICT/SMC BOT</span>
    <span id="server-label" style="color:var(--dim);font-size:9px;margin-left:8px;cursor:pointer;text-decoration:underline dotted" onclick="changeServerUrl()" title="Click to change server URL"></span>
  </div>
  <div class="header-center">
    <div class="price-block">
      <span class="price-sym" id="price-sym">—</span>
      <span class="price-val" id="price-val" style="color:var(--g)">—</span>
      <span id="price-arrow" style="font-size:10px;color:var(--g)">▲</span>
    </div>
    <span class="badge badge-neut" id="bias-badge">— NEUTRAL</span>
  </div>
  <div class="header-right">
    <span class="badge badge-demo" id="conn-badge">DEMO</span>
    <button class="btn btn-dim" id="reconnect-btn" onclick="reconnect()" style="display:none">↺ RECONNECT</button>
    <button class="btn btn-dim" onclick="changeServerUrl()">🔗 SERVER</button>
    <button class="btn btn-start" id="toggle-btn" onclick="toggleBot()">▶ START</button>
  </div>
</div>

<!-- STATS BAR -->
<div id="stats-bar">
  <div class="stat-cell"><div class="stat-label">BALANCE</div><div class="stat-val" id="s-balance">—</div></div>
  <div class="stat-cell"><div class="stat-label">EQUITY</div><div class="stat-val" id="s-equity">—</div></div>
  <div class="stat-cell"><div class="stat-label">FLOAT P&L</div><div class="stat-val" id="s-profit">—</div></div>
  <div class="stat-cell"><div class="stat-label">WIN RATE</div><div class="stat-val" id="s-winrate">—</div></div>
  <div class="stat-cell"><div class="stat-label">LAST SCAN</div><div class="stat-val" id="s-scan" style="font-size:10px;color:var(--dim)">—</div></div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT PANEL -->
  <div id="left">

    <!-- ACCOUNT SWITCHER -->
    <div class="ps">
      <div class="sec-hdr">ACCOUNT <span class="save-ind" id="acct-save-ind">✓ saved</span></div>

      <!-- Connected state card -->
      <div class="acct-card" id="acct-card">
        <div class="acct-top">
          <div>
            <div class="acct-broker" id="acct-broker">—</div>
            <div style="font-size:9px;color:var(--dim);margin-top:2px" id="acct-login-label">Not connected</div>
          </div>
          <div class="acct-status-dot off" id="acct-dot"></div>
        </div>
        <div id="acct-info-rows"></div>
        <div class="acct-actions">
          <button class="btn-acct btn-acct-switch" onclick="openLoginForm('switch')">⇄ SWITCH</button>
          <button class="btn-acct btn-acct-logout" id="acct-logout-btn" onclick="logoutAccount()">✕ LOGOUT</button>
        </div>
      </div>

      <!-- Inline login form -->
      <div class="login-form" id="login-form">
        <div class="lf-title" id="lf-title">CONNECT ACCOUNT</div>
        <input id="lf-login"    class="lf-input" type="text"     placeholder="Login (account number)" autocomplete="off"/>
        <input id="lf-password" class="lf-input" type="password" placeholder="Password" autocomplete="off"/>
        <input id="lf-server"   class="lf-input" type="text"     placeholder="Server  (e.g. Broker-Demo)" autocomplete="off"/>
        <div class="lf-row">
          <button class="btn-lf-connect" id="lf-connect-btn" onclick="connectAccount()">🔌 CONNECT</button>
          <button class="btn-lf-cancel" onclick="closeLoginForm()">✕</button>
        </div>
      </div>

      <!-- Saved accounts -->
      <div class="saved-accts" id="saved-accts"></div>
    </div>

// ── STATE ────────────────────────────────────────────────────────
let BASE        = localStorage.getItem("botApiUrl") || "";
if (!BASE && window.location.protocol === "file:") BASE = "http://localhost:5000";

let botRunning   = false;

// ── SAVED ACCOUNTS ───────────────────────────────────────────────
// Stored as array of { id, login, server, broker, balance, currency }
// Passwords are NEVER stored for security.
let savedAccounts = JSON.parse(localStorage.getItem("savedAccounts") || "[]");

function saveSavedAccounts() {
  localStorage.setItem("savedAccounts", JSON.stringify(savedAccounts));
}

function renderSavedAccounts() {
  const el = document.getElementById("saved-accts");
  if (!savedAccounts.length) { el.innerHTML = ""; return; }
  el.innerHTML = `<div style="font-size:8px;color:var(--dim);letter-spacing:1px;margin-bottom:5px">SAVED ACCOUNTS</div>` +
    savedAccounts.map((a,i) => `
      <div class="saved-acct-item" onclick="prefillAccount(${i})">
        <div>
          <div class="saved-acct-name">${a.broker || a.server}</div>
          <div class="saved-acct-sub">Login ${a.login} · ${a.currency||""}</div>
        </div>
        <span class="saved-acct-del" onclick="deleteSavedAccount(event,${i})">✕</span>
      </div>`).join("");
}

function prefillAccount(i) {
  const a = savedAccounts[i];
  if (!a) return;
  openLoginForm("switch");
  document.getElementById("lf-login").value  = a.login;
  document.getElementById("lf-server").value = a.server;
  document.getElementById("lf-password").focus();
}

function deleteSavedAccount(e, i) {
  e.stopPropagation();
  savedAccounts.splice(i, 1);
  saveSavedAccounts();
  renderSavedAccounts();
}

// ── ACCOUNT SWITCHER ─────────────────────────────────────────────
let _loginFormMode = "connect"; // "connect" | "switch"

function openLoginForm(mode) {
  _loginFormMode = mode || "connect";
  document.getElementById("lf-title").textContent = mode==="switch" ? "SWITCH ACCOUNT" : "CONNECT ACCOUNT";
  document.getElementById("login-form").classList.add("open");
  document.getElementById("lf-password").value = "";
  document.getElementById("lf-password").focus();
}

function closeLoginForm() {
  document.getElementById("login-form").classList.remove("open");
}

async function connectAccount() {
  const login    = document.getElementById("lf-login").value.trim();
  const password = document.getElementById("lf-password").value;
  const server   = document.getElementById("lf-server").value.trim();
  if (!login || !password || !server) { alert("Fill in all three fields."); return; }

  const btn = document.getElementById("lf-connect-btn");
  btn.disabled = true; btn.textContent = "CONNECTING…";

  try {
    const res = await fetch(BASE + "/api/broker", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ login, password, server }),
      signal: AbortSignal.timeout(30000),
    });
    const data = await res.json();

    if (res.ok && data.account) {
      document.getElementById("lf-password").value = "";
      closeLoginForm();
      flashSave("acct-save-ind");
      updateAccountCard(true, data.account);

      // Save account (no password)
      const existing = savedAccounts.findIndex(a => a.login == login && a.server === server);
      const entry = { login, server, broker: data.account.broker||server, balance: data.account.balance, currency: data.account.currency };
      if (existing >= 0) savedAccounts[existing] = entry;
      else savedAccounts.unshift(entry);
      if (savedAccounts.length > 5) savedAccounts = savedAccounts.slice(0,5);
      saveSavedAccounts();
      renderSavedAccounts();

      // New account = new broker = symbol list must be refetched
      _symLoaded = false;
      await refresh();
      await loadSettings();
      await loadSymbols();
    } else {
      alert("Connection failed: " + (data.error || "check credentials"));
    }
  } catch {
    alert("Cannot reach bot server. Check the SERVER URL first.");
  }

  btn.disabled = false; btn.textContent = "🔌 CONNECT";
}

async function logoutAccount() {
  if (!confirm("Disconnect this account from the bot?")) return;
  try {
    await fetch(BASE + "/api/logout", { method: "POST", signal: AbortSignal.timeout(5000) });
  } catch {}
  updateAccountCard(false, {});
  _symLoaded = false;
  renderSymbolPicker({});
  document.getElementById("sym-search").disabled = true;
}

function updateAccountCard(connected, account) {
  const dot    = document.getElementById("acct-dot");
  const broker = document.getElementById("acct-broker");
  const label  = document.getElementById("acct-login-label");
  const rows   = document.getElementById("acct-info-rows");
  const card   = document.getElementById("acct-card");

  if (connected && account) {
    dot.className    = "acct-status-dot on";
    broker.textContent = account.broker || account.server || "MT5";
    label.textContent  = "Login " + (account.login || "—");
    card.classList.add("connected");
    rows.innerHTML = [
      ["Balance",  account.balance  != null ? "$"+Number(account.balance).toFixed(2)  : "—"],
      ["Equity",   account.equity   != null ? "$"+Number(account.equity).toFixed(2)   : "—"],
      ["Currency", account.currency || "—"],
      ["Leverage", account.leverage ? "1:"+account.leverage : "—"],
    ].map(([l,v])=>`<div class="acct-row"><span class="lbl">${l}</span><span class="val">${v}</span></div>`).join("");
  } else {
    dot.className      = "acct-status-dot off";
    broker.textContent = isLive ? "Disconnected" : "Demo Mode";
    label.textContent  = isLive ? "Not connected to MT5" : "Bot offline — showing demo";
    card.classList.remove("connected");
    rows.innerHTML = "";
  }
}

async function loadAccountPanel() {
  try {
    const res = await fetch(BASE + "/api/broker", { signal: AbortSignal.timeout(5000) });
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (data.connected) {
      document.getElementById("lf-login").value  = data.login  || "";
      document.getElementById("lf-server").value = data.server || "";
      updateAccountCard(true, data.account || {});
    } else {
      updateAccountCard(false, {});
    }
  } catch {
    updateAccountCard(false, {});
  }
}

let activeStrats = new Set(

function buildStratList() {
  document.getElementById("strat-list").innerHTML = STRATEGIES.map(s=>`
    <div class="strat-row ${activeStrats.has(s.id)?"on":""}" id="sr-${s.id}">

function toggleStrat(id, on) {

  try { fetch(BASE+"/api/config",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({active_strategies:[...activeStrats]}), signal:AbortSignal.timeout(3000) }); } catch {}
}

function updateStratCount() {
  const el = document.getElementById("strat-count");
  if (el) el.textContent = activeStrats.size+"/"+STRATEGIES.length+" on";

// ── SYMBOL PICKER — loaded entirely from the connected broker ────
// No hardcoded/fallback symbol list. If the bot/broker is offline,
// the picker shows a status message instead of any symbols.
let _allSymbols  = [];
let _groupedSyms = {};
let _activeSym   = localStorage.getItem("activeSym") || "";

async function loadSymbols() {
  const searchEl = document.getElementById("sym-search");
  _symLoading = true;
  searchEl.disabled = true;
  renderSymbolPicker(null, "loading");

  try {
    const res  = await fetch(BASE+"/api/symbols",{ signal:AbortSignal.timeout(15000) });
    const data = await res.json();

    if (data.symbols && data.symbols.length) {
      _allSymbols  = data.symbols;
      _groupedSyms = data.grouped || { "All": data.symbols };
      _symLoaded   = true;
      searchEl.disabled = false;

      // If no active symbol yet, or the saved one isn't offered by this broker, pick the first available
      if (!_activeSym || !_allSymbols.includes(_activeSym)) {
        _activeSym = _allSymbols[0];
        localStorage.setItem("activeSym", _activeSym);
      }
      renderSymbolPicker(_groupedSyms);
    } else {
      // Connected but broker returned nothing, or bot not connected to MT5 yet
      _allSymbols = []; _groupedSyms = {}; _symLoaded = false;
      renderSymbolPicker(null, data.source === "disconnected" ? "disconnected" : "empty");
    }
  } catch {
    _allSymbols = []; _groupedSyms = {}; _symLoaded = false;
    renderSymbolPicker(null, "offline");
  }

  _symLoading = false;
  syncSymLabel();
}

function filterSymbols(q) {
  if (!_symLoaded) return;
  q = q.toUpperCase().trim();
  renderSymbolPicker(q ? {"Results":_allSymbols.filter(s=>s.toUpperCase().includes(q))} : _groupedSyms);
}

function renderSymbolPicker(groups, status) {
  const el = document.getElementById("sym-picker");

  if (status) {
    const messages = {
      loading:      "⏳ Loading instruments from broker…",
      disconnected: "⚠ Bot not connected to MT5 — connect an account above first.",
      offline:      "⚠ Cannot reach bot server. Check 🔗 SERVER URL.",
      empty:        "⚠ Broker returned no instruments.",
    };
    const cls = status === "loading" ? "" : "error";
    el.innerHTML = `<div class="sym-status ${cls}">${messages[status] || "—"}</div>`;
    return;
  }

  if (!groups || !Object.keys(groups).length) {
    el.innerHTML = `<div class="sym-status">No matches</div>`;
    return;
  }

  let html = "";
  for (const [grp,syms] of Object.entries(groups)) {
    if (!syms.length) continue;
    html += `<div class="sym-group-lbl">${grp} (${syms.length})</div><div class="sym-grid">`;
    for (const s of syms)
      html += `<button class="sym-btn ${s===_activeSym?"active":""}" onclick="selectSymbol('${s}')">${s}</button>`;
    html += `</div>`;
  }
  el.innerHTML = html || `<div class="sym-status">No matches</div>`;
}

async function selectSymbol(sym) {
  _activeSym = sym;
  localStorage.setItem("activeSym", sym);
  syncSymLabel();
  document.querySelectorAll(".sym-btn").forEach(b=>b.classList.toggle("active",b.textContent===sym));
  document.getElementById("price-sym").textContent = sym;
  lastSymbol=""; lastPrice=0;
  try {
    await fetch(BASE+"/api/config",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({symbol:sym}), signal:AbortSignal.timeout(4000) });
    flashSave("save-ind");
    _currentConfig.symbol = sym;
  } catch {}
  refresh();
}

function syncSymLabel() {
  const el = document.getElementById("sym-active-lbl");
  if (el) el.textContent = _activeSym || "—";
  document.getElementById("price-sym").textContent = _activeSym || "—";
}

// ── SETTINGS ─────────────────────────────────────────────────────
async function loadSettings() {
  try {
    const res = await fetch(BASE+"/api/config",{ signal:AbortSignal.timeout(5000) });
    if (res.ok) _currentConfig = await res.json();
  } catch {}
  document.getElementById("set-risk").value = _currentConfig.risk_pct       ?? 1.0;
  document.getElementById("set-rr").value   = _currentConfig.min_rr         ?? 2.0;
  document.getElementById("set-max").value  = _currentConfig.max_trades     ?? 3;
  document.getElementById("set-conf").value = _currentConfig.min_confluence ?? 3;
  document.getElementById("set-fvg").value  = _currentConfig.fvg_min_pips   ?? 2.0;
  document.getElementById("set-scan").value = _currentConfig.scan_interval  ?? 60;
  if (_currentConfig.symbol && _currentConfig.symbol !== _activeSym) {
    _activeSym = _currentConfig.symbol;
    localStorage.setItem("activeSym", _activeSym);
    syncSymLabel();
    if (_symLoaded) renderSymbolPicker(_groupedSyms);
  }
}

async function updateSetting(key, val) {
  if (val===""||val==null||(typeof val==="number"&&isNaN(val))) return;
  _currentConfig[key]=val;
  try {
    await fetch(BASE+"/api/config",{ method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({[key]:val}), signal:AbortSignal.timeout(5000) });
    flashSave("save-ind");
    if (key==="symbol") { lastSymbol=""; lastPrice=0; refresh(); }
  } catch { alert("Could not reach bot server — setting not saved."); }
}

function flashSave(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add("show");
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(()=>el.classList.remove("show"),1200);
}

// ── SERVER URL ───────────────────────────────────────────────────
function changeServerUrl() {
  const input = prompt(
    "Enter your bot server URL (Cloudflare Tunnel / VPS public URL)\nExample: https://yourname.trycloudflare.com\n\nCurrent: "+(BASE||"(not set)"),BASE
  );
  if (input===null) return;
  BASE = input.trim().replace(/\/$/,"");
  BASE ? localStorage.setItem("botApiUrl",BASE) : localStorage.removeItem("botApiUrl");
  _symLoaded=false;
  refresh(); loadSettings(); loadAccountPanel(); loadSymbols();
}

async function reconnect() {
  const rb = document.getElementById("reconnect-btn");

  try {
    await fetch(BASE+"/api/reconnect",{ method:"POST", signal:AbortSignal.timeout(5000) });

  setTimeout(()=>{ if (rb) { rb.textContent="↺ RECONNECT"; rb.disabled=false; } },10000);
  // Reconnect may bring a (re)connected MT5 session with symbols available
  _symLoaded = false;
  loadSymbols();
}

}
async function fetchEquity() {
  try { const r=await fetch(BASE+"/api/equity",{signal:AbortSignal.timeout(2500)}); if(r.ok){const d=await r.json();return d.curve||[];} } catch {}
  return DEMO_EQUITY;
}

// ── RENDER ────────────────────────────────────────────────────────
function render(data) {
  botRunning = data.running;
  const bias = data.market_bias||"NEUTRAL";
  const acct = data.account||{};
  const wins = tradeHistory.filter(t=>t.pnl>0).length;
  const wr   = tradeHistory.length ? Math.round(wins/tradeHistory.length*100) : 0;

  document.getElementById("pulse-dot").style.background = botRunning ? "var(--g)" : "var(--a)";
  document.getElementById("server-label").textContent = BASE ? "🔗 "+BASE.replace(/^https?:\/\//,"").slice(0,25) : "🔗 not configured";

  const cb = document.getElementById("conn-badge");
  if (!isLive)              { cb.className="badge badge-demo"; cb.textContent="DEMO"; }
  else if (data.connected)  { cb.className="badge badge-live"; cb.textContent="LIVE"; }
  else if (data.error?.includes("Reconnect")) { cb.className="badge badge-conn"; cb.textContent="CONNECTING"; }
  else                      { cb.className="badge badge-warn"; cb.textContent="DISCONNECTED"; }

  updateAccountCard(!!data.connected, data.account||{});

  // If broker just became connected and we haven't loaded symbols yet, load now
  if (isLive && data.connected && !_symLoaded && !_symLoading) {
    loadSymbols();
  }

  const bb = document.getElementById("bias-badge");
  bb.className  = "badge "+(bias==="BULLISH"?"badge-bull":bias==="BEARISH"?"badge-bear":"badge-neut");
  bb.textContent = "H4 "+bias;

  const tb = document.getElementById("toggle-btn");
  tb.className  = "btn "+(botRunning?"btn-stop":"btn-start");
  tb.textContent = botRunning ? "■ STOP" : "▶ START";
  tb.disabled   = isLive && !data.connected;
  tb.style.opacity = tb.disabled?"0.4":"1";

  const rb = document.getElementById("reconnect-btn");
  if (rb) rb.style.display = (isLive&&!data.connected) ? "" : "none";

  const fmt = n => n!=null ? "$"+Number(n).toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2}) : "—";
  document.getElementById("s-balance").textContent = fmt(acct.balance);
  document.getElementById("s-equity").textContent  = fmt(acct.equity);
  const profit = acct.profit??0;
  const pe = document.getElementById("s-profit");
  pe.textContent = (profit>=0?"+":"")+fmt(Math.abs(profit));
  pe.style.color = profit>=0?"var(--g)":"var(--r)";
  const wre = document.getElementById("s-winrate");
  wre.textContent = tradeHistory.length ? wr+"%" : "—";
  wre.style.color = wr>=50?"var(--g)":"var(--r)";
  document.getElementById("s-scan").textContent = data.last_scan ? new Date(data.last_scan).toLocaleTimeString() : "—";

  // Error banner
  let banner = document.getElementById("error-banner");
  if (!banner) {
    banner = document.createElement("div"); banner.id="error-banner";
    banner.style.cssText="background:rgba(255,181,71,.06);border-bottom:1px solid rgba(255,181,71,.2);padding:5px 20px;font-size:9px;color:var(--a);display:none;";
    document.getElementById("stats-bar").after(banner);
  }
  banner.style.display = (isLive&&data.error) ? "" : "none";
  if (isLive&&data.error) banner.textContent = "⚠ "+data.error;

  // Price ticker
  const sym = data.symbol||_activeSym||"—";
  if (sym!==lastSymbol) { lastPrice=0; lastSymbol=sym; }
  document.getElementById("price-sym").textContent = sym;

  let curPrice=null, pDigits=5;
  const cp=data.current_price||{};
  if (cp.symbol===sym&&cp.mid) { curPrice=cp.mid; pDigits=cp.digits||5; }
  else {
    const t=(data.open_trades||[]).find(t=>t.symbol===sym);
    if (t) curPrice=t.current;
    else { const s=(data.active_signals||[]).find(s=>s.symbol===sym); if(s) curPrice=s.entry; }
  }
  if (curPrice) {
    const pv=document.getElementById("price-val");
    pv.textContent=curPrice.toFixed(pDigits);
    pv.style.color=curPrice>lastPrice?"var(--g)":curPrice<lastPrice?"var(--r)":"var(--text)";
    document.getElementById("price-arrow").textContent=curPrice>=lastPrice?"▲":"▼";
    document.getElementById("price-arrow").style.color=curPrice>=lastPrice?"var(--g)":"var(--r)";
    lastPrice=curPrice;
  }

  renderKillZones(data.kill_zones||[]);
  renderSR(data.sr_levels||[]);
  renderSignals(data.active_signals||[], bias);
  renderTrades(data.open_trades||[]);
}

function renderKillZones(kzs) {
  document.getElementById("kz-list").innerHTML = kzs.map(kz=>`
    <div class="kz-card ${kz.active?"active":""}">
      <div>
        <div class="kz-name">${kz.name}</div>
        <div class="kz-time">${kz.start}:00–${kz.end}:00 UTC</div>
      </div>
      <div class="kz-badge ${kz.active?"active":"inactive"}">
        ${kz.active ? kz.mins_left+"m left" : "in "+kz.mins_until+"m"}
      </div>
    </div>`).join("");
}

function renderSR(levels) {
  document.getElementById("sr-list").innerHTML = levels.map(l=>{
    const bars=Array.from({length:Math.min(l.strength,5)},(_,i)=>
      `<div class="sr-bar" style="height:${5+i*2}px;background:${l.type==="RESISTANCE"?"var(--r)":"var(--g)"};opacity:${0.25+0.75*i/4}"></div>`).join("");
    return `<div class="sr-row ${l.type==="RESISTANCE"?"res":"sup"}">
      <div>
        <div class="sr-price">${l.price.toFixed(5)}</div>
        <div class="sr-meta">${l.type.slice(0,3)} · ${l.dist_pips}p</div>
      </div>
      <div class="sr-bars">${bars}</div>
    </div>`;
  }).join("");
}

function renderSignals(sigs, bias) {
  if (currentTab!=="signals") return;
  const el = document.getElementById("tab-signals");
  if (!sigs.length) {
    el.innerHTML=`<div class="empty"><div class="empty-icon">◎</div><div class="empty-text">Scanning for setups…</div><div class="empty-sub">Waiting for confluence · Bias: ${bias}</div></div>`;
    return;
  }
  el.innerHTML = sigs.map(sig=>{
    const isLong=sig.direction==="BUY";
    const sc=sig.score;
    const scCol=sc>=4?"var(--g)":sc>=3?"var(--a)":"var(--r)";
    const pips=Array.from({length:5},(_,i)=>`<div class="score-pip ${i<sc?"on":""}"></div>`).join("");
    const hitArr  = sig.confluence?.hit  || sig.confluence || [];
    const missArr = sig.confluence?.miss || [];
    return `
    <div class="sig-card ${isLong?"buy":"sell"}">
      <div class="sig-top">
        <div class="sig-left">
          <span class="sig-dir ${isLong?"buy":"sell"}">${isLong?"▲ LONG":"▼ SHORT"}</span>
          <span class="sig-symbol">${sig.symbol}</span>
          ${sig.in_kz?'<span class="sig-kz">⚡ KZ</span>':""}
          ${sig.strategy?`<span class="sig-strat">${sig.strategy}</span>`:""}
        </div>
        <div class="sig-score-block">
          <span class="sig-score-num" style="color:${scCol}">${sc}/5</span>
          <div class="score-pips">${pips}</div>
        </div>
      </div>
      <div class="sig-levels">
        <div class="sig-level"><div class="sig-level-lbl">ENTRY</div><div class="sig-level-val" style="color:var(--text)">${sig.entry.toFixed(5)}</div></div>
        <div class="sig-level"><div class="sig-level-lbl">STOP LOSS</div><div class="sig-level-val" style="color:var(--r)">${sig.sl.toFixed(5)}</div></div>
        <div class="sig-level"><div class="sig-level-lbl">TAKE PROFIT</div><div class="sig-level-val" style="color:var(--g)">${sig.tp.toFixed(5)}</div></div>
      </div>
      <div class="sig-meta">
        <span class="sig-tag">Risk ${sig.risk_pips}p</span>
        <span class="sig-tag" style="color:var(--g)">R:R 1:${sig.rr}</span>
        <span class="sig-tag">${new Date(sig.time).toLocaleTimeString()}</span>
      </div>
      <div class="conf-hdr">CONFLUENCE — ${hitArr.length} hit / ${hitArr.length+missArr.length} checked</div>
      <div class="conf-grid">
        ${hitArr.map(c=>`<div class="conf-item hit"><div class="conf-dot hit"></div>${c}</div>`).join("")}
        ${missArr.map(c=>`<div class="conf-item miss"><div class="conf-dot miss"></div>${c}</div>`).join("")}
      </div>
    </div>`;
  }).join("");
}

function renderTrades(trades) {
  document.getElementById("trades-hdr").textContent=`OPEN TRADES (${trades.length})`;
  const el=document.getElementById("trades-list");
  if (!trades.length) {
    el.innerHTML=`<div class="empty"><div class="empty-icon" style="font-size:18px">—</div><div class="empty-text" style="font-size:10px">No open trades</div></div>`;
    return;
  }
  el.innerHTML=trades.map(t=>{
    const isLong=t.direction==="BUY";
    const pc=t.pnl>=0?"var(--g)":"var(--r)";
    return `
    <div class="trade-card ${isLong?"buy":"sell"}">
      <div class="trade-head">
        <div><span style="color:${isLong?"var(--g)":"var(--r)"};font-weight:700;font-size:10px">${isLong?"▲":"▼"} ${t.direction}</span>
          <span style="font-size:12px;font-weight:700;margin-left:5px">${t.symbol}</span></div>
        <span style="color:${pc};font-weight:700">${t.pnl>=0?"+":""}$${Math.abs(t.pnl).toFixed(2)}</span>
      </div>
      ${[["Entry",t.entry.toFixed(5)],["Current",t.current.toFixed(5)],["SL",t.sl.toFixed(5)],["TP",t.tp.toFixed(5)],["Lots",t.lots],["#",t.ticket]]
        .map(([l,v])=>`<div class="trade-row"><span class="lbl">${l}</span><span class="val">${v}</span></div>`).join("")}
      <button class="btn-close-trade" onclick="closeTrade(${t.ticket})">✕ CLOSE TRADE</button>
    </div>`;
  }).join("");
}

function renderHistory() {
  if (currentTab!=="history") return;
  const el=document.getElementById("tab-history");
  if (!tradeHistory.length) { el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No trade history</div></div>`; return; }
  el.innerHTML=`<table id="history-table">
    <thead><tr><th>SYMBOL</th><th>DIR</th><th>ENTRY</th><th>CLOSE</th><th>PIPS</th><th>P&L</th><th>DATE</th></tr></thead>
    <tbody>${tradeHistory.slice().reverse().map(t=>{
      const win=t.pnl>0;
      return `<tr>
        <td>${t.symbol}</td>
        <td style="color:${t.direction==="BUY"?"var(--g)":"var(--r)"}">${t.direction==="BUY"?"▲":"▼"} ${t.direction}</td>
        <td style="color:var(--muted)">${typeof t.entry==="number"?t.entry.toFixed(5):t.entry}</td>
        <td style="color:var(--muted)">${typeof t.close==="number"?t.close.toFixed(5):"—"}</td>
        <td style="color:${win?"var(--g)":"var(--r)"}">${typeof t.pips==="number"?(t.pips>0?"+":"")+t.pips.toFixed(1):"—"}</td>
        <td style="color:${win?"var(--g)":"var(--r)"};font-weight:700">${win?"+":""}$${t.pnl.toFixed(2)}</td>
        <td style="color:var(--dim)">${new Date(t.time).toLocaleDateString()}</td>
      </tr>`;
    }).join("")}</tbody>
  </table>`;
}

function renderEquityChart() {
  if (currentTab!=="chart") return;
  const tab=document.getElementById("tab-chart");
  tab.innerHTML=`<div style="color:var(--dim);font-size:8px;letter-spacing:2px;margin-bottom:10px">EQUITY CURVE</div>
    <div id="equity-canvas-wrap"><canvas id="equity-canvas"></canvas></div>
    <div class="chart-stats" id="chart-stats"></div>`;
  const ctx=document.getElementById("equity-canvas").getContext("2d");
  if (equityChart) equityChart.destroy();
  const labels=equityCurve.map(p=>new Date(p.time).toLocaleTimeString());
  const values=equityCurve.map(p=>p.equity);
  const start=values[0]||10000, current=values[values.length-1]||start;
  const peak=Math.max(...values), dd=((peak-current)/peak*100).toFixed(1);
  equityChart=new Chart(ctx,{type:"line",data:{labels,datasets:[{data:values,borderColor:"#00d97e",borderWidth:1.5,pointRadius:0,fill:true,
    backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,200);g.addColorStop(0,"rgba(0,217,126,0.12)");g.addColorStop(1,"rgba(0,217,126,0)");return g;},tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>"$"+ctx.raw.toFixed(2)},backgroundColor:"#0b0b18",borderColor:"#171728",borderWidth:1,titleColor:"#6b7280",bodyColor:"#c8d3e6"}},
      scales:{x:{display:false},y:{grid:{color:"#171728"},ticks:{color:"#374151",font:{family:"monospace",size:9},callback:v=>"$"+v.toFixed(0)}}}}});
  document.getElementById("chart-stats").innerHTML=[
    ["Start Balance","$"+start.toFixed(2),"var(--muted)"],
    ["Current Equity","$"+current.toFixed(2),"var(--text)"],
    ["Peak Equity","$"+peak.toFixed(2),"var(--g)"],
    ["Drawdown",dd+"%",parseFloat(dd)<5?"var(--a)":"var(--r)"],
    ["Total Trades",tradeHistory.length,"var(--text)"],
    ["Total P&L","$"+tradeHistory.reduce((s,t)=>s+t.pnl,0).toFixed(2),tradeHistory.reduce((s,t)=>s+t.pnl,0)>=0?"var(--g)":"var(--r)"],
  ].map(([l,v,c])=>`<div class="chart-stat"><div class="chart-stat-lbl">${l}</div><div class="chart-stat-val" style="color:${c}">${v}</div></div>`).join("");
}

// ── TABS ──────────────────────────────────────────────────────────
function switchTab(name,el) {
  currentTab=name;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  ["signals","chart","history"].forEach(t=>document.getElementById("tab-"+t).style.display=t===name?"":"none");
  if (name==="chart")   renderEquityChart();
  if (name==="history") renderHistory();
}

// ── BOT CONTROL ───────────────────────────────────────────────────
async function toggleBot() {
  try { await fetch(BASE+(botRunning?"/api/stop":"/api/start"),{method:"POST",signal:AbortSignal.timeout(3000)}); await refresh(); }
  catch { alert("Could not reach bot server."); }
}
async function closeTrade(ticket) {
  if (!confirm("Close trade #"+ticket+"?")) return;
  try { const r=await fetch(`${BASE}/api/close/${ticket}`,{method:"POST",signal:AbortSignal.timeout(3000)}); const d=await r.json(); alert(d.message||d.error); await refresh(); }
  catch { alert("Cannot reach bot server."); }
}

// ── MAIN LOOP ─────────────────────────────────────────────────────
async function refresh() {
  const [status,hist,equity]=await Promise.all([fetchStatus(),fetchHistory(),fetchEquity()]);
  tradeHistory=hist; equityCurve=equity;
  render(status);
  if (currentTab==="history") renderHistory();
  if (currentTab==="chart")   renderEquityChart();
}

// ── INIT ──────────────────────────────────────────────────────────
buildStratList();
renderSavedAccounts();
syncSymLabel();
renderSymbolPicker(null, "offline");
loadAccountPanel();
loadSettings();
loadSymbols();

if (!BASE && window.location.protocol!=="file:") {
  changeServerUrl();
} else {
  refresh();
}
setInterval(refresh, 5000);
</script>
